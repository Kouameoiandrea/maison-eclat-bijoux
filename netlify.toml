[build]
  command = "echo Building Netlify functions"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express", "serverless-http", "pg", "nodemailer", "jsonwebtoken", "body-parser"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/orders"
  status = 302
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/proxy/image"
  to = "/.netlify/functions/api/proxy/image"
  status = 200
  force = true
